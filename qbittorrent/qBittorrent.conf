[BitTorrent]
Session\CheckingMemUsageSize=128
Session\Port=${LISTENING_PORT}
Session\Preallocation=true

; Seeding
Session\GlobalMaxRatio=1
Session\GlobalMaxSeedingMinutes=1440
Session\GlobalMaxInactiveSeedingMinutes=1440

; Do not change to manual mode, relocate torrents when paths or categories change
Session\DisableAutoTMMByDefault=false
Session\DisableAutoTMMTriggers\CategorySavePathChanged=false
Session\DisableAutoTMMTriggers\DefaultSavePathChanged=false

; Paths and layout
Session\SubcategoriesEnabled=true
Session\TempPathEnabled=true
Session\TempPath=${TORRENT_ROOT}/Torrents/temp/
Session\TorrentContentLayout=Subfolder
Session\DefaultSavePath=${TORRENT_ROOT}/Torrents/
Session\FinishedTorrentExportDirectory=${TORRENT_ROOT}/_torrents/Completed/

; Queuing
Session\AddTorrentPaused=true
Session\QueueingSystemEnabled=true
; default values
Session\MaxActiveTorrents=5
Session\MaxActiveDownloads=3
Session\MaxActiveUploads=3
; ignore slow torrents as defined below from queue limits
Session\IgnoreSlowTorrentsForQueueing=true
; in KiB/s
Session\SlowTorrentsDownloadRate=2
Session\SlowTorrentsUploadRate=2
; in seconds
Session\SlowTorrentsInactivityTimer=60

[Core]
AutoDeleteAddedTorrentFile=Never

[LegalNotice]
Accepted=true

[Preferences]
Advanced\RecheckOnCompletion=true
General\Locale=en

; Web UI
WebUI\Enabled=true
WebUI\Address=*
WebUI\ServerDomains=*
WebUI\AuthSubnetWhitelistEnabled=true
WebUI\AuthSubnetWhitelist=192.168.1.1/22
WebUI\Username=hashhar
WebUI\Password_PBKDF2="@ByteArray(9x2A6Dp+RQIu7vHa5xGbOQ==:bLaWmprpPVijOICXKOiFO0TnNPD52FEbXklBZTCbNqpafqIqnM9ROr/QJuZg5SHWGTFmAJYxzgQ9u0lzDnuipQ==)"
WebUI\UseUPnP=false

; Connection
Connection\PortRangeMin=${LISTENING_PORT}
Connection\UPnP=false
