services:
  caddy:
    build:
      context: caddy
    image: hashhar/caddy:local
    container_name: caddy
    env_file:
      - caddy/secrets.env
    environment:
      - PLEX_PORT=32400
      - QBITTORRENT_PORT=$QBITTORRENT_PORT
      - SYNCTHING_PORT=8384
      - RESTIC_REST_SERVER_PORT=$RESTIC_REST_SERVER_PORT
      - IMMICH_PORT=$IMMICH_PORT
      - HOST_ADDRESS=syno.hashhar.com # IP/port resolving to NAS - for connecting to containers using host networks
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      # x.x.x.3 to match last octet to IP of Synology for easy remembering
      macvlan:
        ipv4_address: "192.168.2.3"
      bridge:
        ipv4_address: "172.18.0.3"
    restart: unless-stopped

  plex:
    depends_on:
      - caddy
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      - PUID=$PLEX_UID
      - PGID=$PLEX_GID
      - TZ=$TZ
      - VERSION=docker
    volumes:
      - $DOCKER_DATA/plex/config:/config
      - $DOCKER_DATA/plex/transcode:/transcode
      - $DATA_ROOT/Media:$DATA_ROOT/Media:ro # read-only (will prevent us from deleting things from the UI)
    networks:
      bridge:
        ipv4_address: "172.18.0.4"
    ports:
      # See list of ports at https://support.plex.tv/articles/201543147
      # Plex Media Server port is not exposed - reachable via caddy
      - "32410-32414:32410-32414/udp" # GDM network discovery
      - "32469:32469" # DLNA server
    restart: unless-stopped

  qbittorrent:
    depends_on:
      - caddy
    build:
      context: qbittorrent
      args:
        - LISTENING_PORT=$QBITTORRENT_LISTENING_PORT
        - DATA_ROOT
    image: hashhar/qbittorrent:local
    container_name: qbittorrent
    environment:
      - PUID=$QBITTORRENT_UID
      - PGID=$QBITTORRENT_GID
      - TZ=$TZ
      - WEBUI_PORT=$QBITTORRENT_PORT
    volumes:
      - $DATA_ROOT/Staging:$DATA_ROOT/Staging
      - $DOCKER_DATA/qbittorrent/config:/config
    networks:
      bridge:
        ipv4_address: "172.18.0.5"
    ports:
      - "$QBITTORRENT_LISTENING_PORT:$QBITTORRENT_LISTENING_PORT"
      - "$QBITTORRENT_LISTENING_PORT:$QBITTORRENT_LISTENING_PORT/udp"
    restart: unless-stopped

  syncthing:
    depends_on:
      - caddy
    image: syncthing/syncthing:2.0.15
    container_name: syncthing
    hostname: Radon # name of syncthing instance
    environment:
      - PUID=$SYNCTHING_UID
      - PGID=$SYNCTHING_GID
      - TZ=$TZ
    volumes:
      - $DOCKER_DATA/syncthing:/var/syncthing
      - $DATA_ROOT/Personal/Pictures/Synced:$DATA_ROOT/Personal/Pictures/Synced
    network_mode: "host" # required for local discovery to work
    # Uses ports 8384 (UI), 22000/tcp,udp (file transfer) and 21027/udp (local discovery)
    restart: unless-stopped

  gallery-dl:
    # Only runs when this profile is enabled
    profiles:
      - gallery-dl
    build:
      context: gallery-dl
    image: hashhar/gallery-dl:latest-0
    container_name: gallery-dl
    environment:
      - PUID=$SYNCTHING_UID
      - PGID=$SYNCTHING_GID
    volumes:
      - $DOCKER_DATA/gallery-dl/data:/data
      - $DATA_ROOT/Personal/Pictures/Synced/Wallpapers/Fun:/download
    network_mode: "host"
    # this is expected to run and exit when done
    restart: "no"

  restic-rest-server:
    depends_on:
      - caddy
    build:
      context: restic-rest-server
    image: hashhar/restic-rest-server:local
    container_name: restic-rest-server
    environment:
      - PUID=$RESTIC_UID
      - PGID=$RESTIC_GID
      # TLS is being provided via proxying through caddy
      - OPTIONS=--append-only --group-accessible-repos --private-repos --prometheus --prometheus-no-auth
    volumes:
      # /data is the default repo location in Docker image
      - $RESTIC_ROOT/restic:/data
    networks:
      bridge:
        ipv4_address: "172.18.0.6"
    restart: unless-stopped

  prometheus:
    depends_on:
      - caddy
    build:
      context: prometheus
      args:
        - RESTIC_REST_SERVER_PORT=$RESTIC_REST_SERVER_PORT
    image: hashhar/prometheus:local
    container_name: prometheus
    volumes:
      - prometheus_data:/prometheus
    networks:
      bridge:
        ipv4_address: "172.18.0.7"
    restart: unless-stopped

  grafana:
    depends_on:
      - caddy
      - prometheus
    image: grafana/grafana:12.4.0
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # Password set via secrets.env
      - GF_SERVER_ROOT_URL=https://grafana.nas.hashhar.com
    env_file:
      - grafana/secrets.env
    networks:
      bridge:
        ipv4_address: "172.18.0.15"
    restart: unless-stopped

  alertmanager:
    build:
      context: alertmanager
    image: hashhar/alertmanager:local
    container_name: alertmanager
    env_file:
      - alertmanager/secrets.env
    networks:
      bridge:
        ipv4_address: "172.18.0.16"
    restart: unless-stopped

  smartctl-exporter:
    image: prometheuscommunity/smartctl-exporter:v0.14.0
    container_name: smartctl-exporter
    # Image defaults to nobody but /dev/sata* are brw------- root:root
    user: "root"
    cap_add:
      - SYS_RAWIO
    devices:
      - "/dev/sata1"
      - "/dev/sata2"
      - "/dev/sata3"
      - "/dev/sata4"
      - "/dev/sata5"
      - "/dev/sata6"
      - "/dev/sata7"
      - "/dev/sata8"
    # No udev inside the container so `smartctl --scan` auto-discovery finds nothing;
    # devices must be listed explicitly
    command:
      - "--smartctl.device=/dev/sata1"
      - "--smartctl.device=/dev/sata2"
      - "--smartctl.device=/dev/sata3"
      - "--smartctl.device=/dev/sata4"
      - "--smartctl.device=/dev/sata5"
      - "--smartctl.device=/dev/sata6"
      - "--smartctl.device=/dev/sata7"
      - "--smartctl.device=/dev/sata8"
    networks:
      bridge:
        ipv4_address: "172.18.0.13"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node-exporter
    pid: "host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|snap)($|/)"
    networks:
      bridge:
        ipv4_address: "172.18.0.14"
    restart: unless-stopped

  immich-server:
    depends_on:
      caddy:
        condition: service_started
      immich-redis:
        condition: service_healthy
      immich-database:
        condition: service_healthy
    image: ghcr.io/immich-app/immich-server:v2.5.6
    container_name: immich-server
    user: "$IMMICH_UID:$IMMICH_GID"
    environment:
      - DB_HOSTNAME=immich-database
      - DB_USERNAME=postgres
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
      - IMMICH_TRUSTED_PROXIES=172.18.0.3
      - IMMICH_TELEMETRY_INCLUDE=all
      - TZ=$TZ
    env_file:
      - immich/secrets.env
    volumes:
      - $DOCKER_DATA/immich/upload:/data
      - /etc/localtime:/etc/localtime:ro
      - $DATA_ROOT/Personal/Pictures/Synced:$DATA_ROOT/Personal/Pictures/Synced
    healthcheck:
      disable: false
    networks:
      bridge:
        ipv4_address: "172.18.0.9"
    restart: unless-stopped

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.5.6
    container_name: immich-machine-learning
    volumes:
      - immich_model_cache:/cache
    networks:
      bridge:
        ipv4_address: "172.18.0.12"
    restart: unless-stopped

  immich-redis:
    image: valkey/valkey:9-alpine
    container_name: immich-redis
    healthcheck:
      test: redis-cli ping || exit 1
    networks:
      bridge:
        ipv4_address: "172.18.0.10"
    restart: unless-stopped

  immich-database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
      DB_STORAGE_TYPE: 'HDD'
    env_file:
      - immich/secrets.env
    volumes:
      - immich_postgres_data:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      disable: false
    networks:
      bridge:
        ipv4_address: "172.18.0.11"
    restart: unless-stopped

networks:
  macvlan:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: "192.168.2.0/24"
  bridge:
    driver: bridge
    ipam:
      config:
        - subnet: "172.18.0.0/16"

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  immich_postgres_data:
  immich_model_cache:
