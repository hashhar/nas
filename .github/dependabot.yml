version: 2
updates:
  - package-ecosystem: "docker"
    directories:
      - "/stacks/infra/caddy"
      - "/stacks/monitoring/alertmanager"
      - "/stacks/media/gallery-dl"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker-compose"
    directories:
      - "/stacks/infra"
      - "/stacks/monitoring"
      - "/stacks/media"
      - "/stacks/photos"
      - "/stacks/sync"
      # Remote-worker overlays for the desktop GPU box live here.
      - "/stacks/photos/immich"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "hashhar/*"
      # Postgres major version is pinned to Immich's supported
      # major and cannot be bumped without a manual DB migration. The
      # vectorchord/pgvectors portions of the tag are still tracked.
      - dependency-name: "ghcr.io/immich-app/postgres"
        update-types: ["version-update:semver-major"]
