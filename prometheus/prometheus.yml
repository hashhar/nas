global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "restic_rest_server"
    static_configs:
      - targets: ["restic-rest-server:${RESTIC_REST_SERVER_PORT}"]

  - job_name: "caddy"
    static_configs:
      - targets: ["caddy:80"]
